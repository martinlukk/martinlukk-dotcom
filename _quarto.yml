project:
  type: website
  output-dir: _site
  resources:
    - cv.pdf
    - favicon.ico
    - assets/
  # `posts/` is the blog directory; excluded from rendering until the
  # first post lands. To enable: drop the exclusion below and
  # uncomment the Blog link in `_includes/header.html`.
  render:
    - "**/*.qmd"
    - "!posts/**"

filters:
  - _filters/pub-detail.lua
  - _filters/media-detail.lua

website:
  title: "Martin Lukk"
  description: "Computational social scientist studying how humans and automated systems decide who deserves what."
  site-url: "https://www.martinlukk.com"
  favicon: favicon.ico
  image: /images/sharing.jpg    # default og:image / twitter:image, used on
                                # any page that doesn't set its own
  open-graph: true
  twitter-card:
    creator: "@martin_lukk"
  page-navigation: false
  back-to-top-navigation: false

format:
  html:
    from: markdown+emoji
    theme:
      - cosmo
      - styles/custom.scss
    toc: false
    page-layout: custom
    include-before-body:
      - _includes/header.html
      - _includes/sidebar.html
    include-after-body:
      - _includes/footer.html
      - _includes/scripts.html
    link-external-icon: false
