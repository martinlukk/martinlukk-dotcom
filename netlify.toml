[build]
  command = "curl -sL https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz | tar -xz -C /tmp && export PATH=\"/tmp/quarto-${QUARTO_VERSION}/bin:$PATH\" && quarto render"
  publish = "_site"

[build.environment]
  QUARTO_VERSION = "1.8.26"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/about/*"
  to   = "/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to   = "/posts/:splat"
  status = 301

[[redirects]]
  from = "/cv.html"
  to   = "/cv.pdf"
  status = 301

[[redirects]]
  from = "/doc/cv.pdf"
  to   = "/cv.pdf"
  status = 301
